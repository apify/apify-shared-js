name: Publish to NPM

on:
    workflow_dispatch:
        inputs:
            ref:
                description: Git ref to publish (branch, tag, or commit SHA)
                required: true
                type: string

permissions:
    id-token: write # Required for OIDC
    contents: write # Required to push changelog/lock file updates

jobs:
    publish_to_npm:
        name: Publish to NPM
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.ref }}
                  token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
                  fetch-depth: 0 # we need to pull everything to allow lerna to detect what packages changed
            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  registry-url: 'https://registry.npmjs.org'
            - name: Install pnpm and dependencies
              uses: apify/actions/pnpm-install@v1.1.2
            - name: Check for pre-existing NPM drift
              # Fail fast if a previous release tagged a version that never reached npm, before we
              # publish anything new that bakes a `workspace:^` reference over the gap (see #649).
              # We only check packages this run is NOT releasing: a package we're about to publish
              # legitimately isn't on npm yet (new version, or one we're re-publishing to recover
              # from a failed release), so checking it would either be pointless or block recovery.
              # The drift that actually breaks consumers is an *unreleased* dependency.
              run: |
                  releasing="$(pnpm exec lerna changed --json 2>/dev/null | jq -r '.[].name' || true)"
                  missing=""
                  for spec in $(pnpm exec lerna ls --json | jq -r '.[] | "\(.name)@\(.version)"'); do
                      name="${spec%@*}"
                      if printf '%s\n' "$releasing" | grep -qxF "$name"; then continue; fi
                      npm view "$spec" version >/dev/null 2>&1 || missing="$missing $spec"
                  done
                  if [ -n "$missing" ]; then
                      echo "MISSING ON NPM:$missing"
                      echo "A previous release tagged these versions but never published them. Publish the missing version(s), or revert the unpublished bump, before releasing."
                      exit 1
                  fi
            - name: Build module
              run: pnpm build
            - name: Publish to NPM
              run: |
                  git checkout -- .
                  pnpm exec lerna publish --contents dist --yes
                  pnpm install --no-frozen-lockfile # reinstall to have updated lock file
                  pnpm exec lerna ls --json | node scripts/sync-root-changelog.ts
              env:
                  GH_TOKEN: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
                  GIT_AUTHOR_NAME: Apify Release Bot
                  GIT_COMMITTER_NAME: Apify Release Bot
                  GIT_AUTHOR_EMAIL: noreply@apify.com
                  GIT_COMMITTER_EMAIL: noreply@apify.com
            - name: Commit changes
              uses: apify/actions/signed-commit@v1.0.0
              with:
                  message: 'chore: update root lock file and changelog [skip ci]'
                  pull: '--rebase --autostash'
                  github-token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
